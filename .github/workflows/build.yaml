name: Build

on:
  push:
    branches:
      - main
      - release*
  pull_request:
    types: [opened, reopened, edited, synchronize]
  workflow_call:

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    env:
      MAVEN_ARGS: --batch-mode -Dstyle.color=always

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Xvfb
        run: sudo apt-get install -y xvfb

      - name: Build and test
        run: xvfb-run mvn $MAVEN_ARGS clean verify
