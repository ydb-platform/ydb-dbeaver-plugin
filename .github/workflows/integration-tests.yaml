name: Integration Tests

on:
  push:
    branches:
      - main
      - release*
  pull_request:
    types: [opened, reopened, edited, synchronize]
  workflow_call:

jobs:
  integration-tests:
    name: Integration tests (YDB + MinIO)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run integration tests
        run: bash integration-tests/run-tests.sh
