name: Deploy

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  validate:
    name: Validate version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Check version is not SNAPSHOT
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout --batch-mode)
          echo "Project version: $VERSION"
          if [[ "$VERSION" == *SNAPSHOT* ]]; then
            echo "ERROR: SNAPSHOT version cannot be deployed"
            exit 1
          fi
          if [[ "v$VERSION" != "${{ github.ref_name }}" ]]; then
            echo "ERROR: Tag ${{ github.ref_name }} does not match project version v$VERSION"
            exit 1
          fi

  build:
    name: Build and unit tests
    needs: validate
    uses: ./.github/workflows/build.yaml

  integration-tests:
    name: Integration tests
    needs: validate
    uses: ./.github/workflows/integration-tests.yaml

  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    needs: [validate, build, integration-tests]

    env:
      MAVEN_ARGS: --batch-mode -DskipTests

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build (P2 repository)
        run: mvn $MAVEN_ARGS clean package

      - name: Upload P2 repository to Yandex Cloud S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"
          REPO_DIR="repository/target/repository"
          S3_BASE="s3://ydb-dbeaver-plugin"
          S3_DEST="${S3_BASE}/${VERSION_NUM}/"
          YC_ENDPOINT="https://storage.yandexcloud.net"

          # Upload versioned P2 repository
          aws s3 sync "$REPO_DIR" "$S3_DEST" \
            --endpoint-url "$YC_ENDPOINT" \
            --no-progress \
            --exclude '*' --include '*.jar' \
            --content-type 'application/java-archive'

          aws s3 sync "$REPO_DIR" "$S3_DEST" \
            --endpoint-url "$YC_ENDPOINT" \
            --exclude '*' --include '*.xml.xz' \
            --content-type 'application/x-xz'

          aws s3 sync "$REPO_DIR" "$S3_DEST" \
            --endpoint-url "$YC_ENDPOINT" \
            --exclude '*' --include '*.xml' \
            --content-type 'application/xml'

          aws s3 sync "$REPO_DIR" "$S3_DEST" \
            --endpoint-url "$YC_ENDPOINT" \
            --exclude '*' --include '*.zip' \
            --content-type 'application/zip'

          aws s3 sync "$REPO_DIR" "$S3_DEST" \
            --endpoint-url "$YC_ENDPOINT" \
            --no-progress \
            --exclude 'p2.index'

          # Write a correct child p2.index matching files we actually uploaded (*.jar)
          cat > child_p2.index << 'EOF'
          version=1
          metadata.repository.factory.order=content.jar,content.xml,\!
          artifact.repository.factory.order=artifacts.jar,artifacts.xml,\!
          EOF
          aws s3 cp child_p2.index "${S3_DEST}p2.index" \
            --endpoint-url "$YC_ENDPOINT" --content-type 'text/plain'

          # Collect all version subdirectories from S3
          VERSIONS=$(aws s3 ls "${S3_BASE}/" \
            --endpoint-url "$YC_ENDPOINT" \
            | awk '/\/$/ {print $NF}' | sed 's|/$||' | sort -V)

          CHILDREN_COUNT=$(echo "$VERSIONS" | wc -l | tr -d ' ')
          TIMESTAMP=$(date +%s)000

          CHILDREN=""
          while IFS= read -r v; do
            CHILDREN="${CHILDREN}    <child location='${v}'/>"$'\n'
          done <<< "$VERSIONS"

          # Generate compositeArtifacts.xml
          cat > compositeArtifacts.xml << EOF
          <?xml version='1.0' encoding='UTF-8'?>
          <?compositeArtifactRepository version='1.0.0'?>
          <repository name='YDB DBeaver Plugin' type='org.eclipse.equinox.internal.p2.artifact.repository.CompositeArtifactRepository' version='1.0.0'>
            <properties size='1'>
              <property name='p2.timestamp' value='${TIMESTAMP}'/>
            </properties>
            <children size='${CHILDREN_COUNT}'>
          ${CHILDREN}  </children>
          </repository>
          EOF

          # Generate compositeContent.xml
          cat > compositeContent.xml << EOF
          <?xml version='1.0' encoding='UTF-8'?>
          <?compositeMetadataRepository version='1.0.0'?>
          <repository name='YDB DBeaver Plugin' type='org.eclipse.equinox.internal.p2.metadata.repository.CompositeMetadataRepository' version='1.0.0'>
            <properties size='1'>
              <property name='p2.timestamp' value='${TIMESTAMP}'/>
            </properties>
            <children size='${CHILDREN_COUNT}'>
          ${CHILDREN}  </children>
          </repository>
          EOF

          # Generate p2.index
          cat > p2.index << EOF
          version=1
          metadata.repository.factory.order=compositeContent.xml,\!
          artifact.repository.factory.order=compositeArtifacts.xml,\!
          EOF

          # Upload composite files to bucket root
          aws s3 cp compositeArtifacts.xml "${S3_BASE}/compositeArtifacts.xml" \
            --endpoint-url "$YC_ENDPOINT" --content-type 'application/xml'
          aws s3 cp compositeContent.xml "${S3_BASE}/compositeContent.xml" \
            --endpoint-url "$YC_ENDPOINT" --content-type 'application/xml'
          aws s3 cp p2.index "${S3_BASE}/p2.index" \
            --endpoint-url "$YC_ENDPOINT" --content-type 'text/plain'

          echo "Deployed ${VERSION_NUM} to: ${YC_ENDPOINT}/ydb-dbeaver-plugin/${VERSION_NUM}"
          echo "Composite repository updated with versions: $(echo $VERSIONS | tr '\n' ' ')"

      - name: Patch plugin.xml for standalone build
        run: |
          sed -i '/<file type="jar" path="maven:\/tech.ydb.jdbc:ydb-jdbc-driver-shaded/d' \
            plugins/org.jkiss.dbeaver.ext.ydb/plugin.xml

      - name: Build (standalone ZIP)
        run: mvn $MAVEN_ARGS clean package

      - name: Prepare standalone ZIP
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"
          cp "repository/target/org.jkiss.dbeaver.ext.ydb.repository-${VERSION_NUM}.zip" \
             "ydb-dbeaver-plugin-${VERSION_NUM}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: YDB DBeaver Plugin ${{ github.ref_name }}
          files: ydb-dbeaver-plugin-*.zip
          body: |
            ## Installation

            ### Online (via DBeaver update site)

            1. Open DBeaver → **Help** → **Install New Software…**
            2. Click **Add…** and enter the P2 repository URL:
               ```
               https://storage.yandexcloud.net/ydb-dbeaver-plugin
               ```
            3. Select **YDB DBeaver Plugin** and complete the installation.

            ### Offline (standalone ZIP)

            1. Download `ydb-dbeaver-plugin-*.zip` from the release assets below.
            2. Open DBeaver → **Help** → **Install New Software…**
            3. Click **Add…** → **Archive…** → select the downloaded ZIP.
            4. Select **YDB DBeaver Plugin**, click Next, accept the license, and restart DBeaver.
