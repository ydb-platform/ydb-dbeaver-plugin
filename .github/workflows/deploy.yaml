name: Deploy

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  validate:
    name: Validate version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Check version is not SNAPSHOT
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout --batch-mode)
          echo "Project version: $VERSION"
          if [[ "$VERSION" == *SNAPSHOT* ]]; then
            echo "ERROR: SNAPSHOT version cannot be deployed"
            exit 1
          fi
          if [[ "v$VERSION" != "${{ github.ref_name }}" ]]; then
            echo "ERROR: Tag ${{ github.ref_name }} does not match project version v$VERSION"
            exit 1
          fi

  deploy:
    name: Build and deploy to S3
    runs-on: ubuntu-latest
    needs: validate

    env:
      MAVEN_ARGS: --batch-mode -DskipTests

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build
        run: mvn $MAVEN_ARGS clean package

      - name: Upload P2 repository to Yandex Cloud S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET }}
        run: |
          REPO_DIR="repository/target/repository"
          S3_DEST="s3://ydb-dbeaver/dbeaver/"
          YC_ENDPOINT="https://storage.yandexcloud.net"

          aws s3 sync "$REPO_DIR" "$S3_DEST" \
            --endpoint-url "$YC_ENDPOINT" \
            --delete --no-progress \
            --exclude '*' --include '*.jar' \
            --content-type 'application/java-archive'

          aws s3 sync "$REPO_DIR" "$S3_DEST" \
            --endpoint-url "$YC_ENDPOINT" \
            --exclude '*' --include '*.xml.xz' \
            --content-type 'application/x-xz'

          aws s3 sync "$REPO_DIR" "$S3_DEST" \
            --endpoint-url "$YC_ENDPOINT" \
            --exclude '*' --include '*.xml' \
            --content-type 'application/xml'

          aws s3 sync "$REPO_DIR" "$S3_DEST" \
            --endpoint-url "$YC_ENDPOINT" \
            --exclude '*' --include '*.zip' \
            --content-type 'application/zip'

          aws s3 sync "$REPO_DIR" "$S3_DEST" \
            --endpoint-url "$YC_ENDPOINT" \
            --no-progress

          echo "Deployed to: ${YC_ENDPOINT}/ydb-dbeaver/dbeaver"
